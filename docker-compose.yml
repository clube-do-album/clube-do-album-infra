services:
  postgres:
    image: postgres:16
    container_name: clube-do-album-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clube_do_album}
      POSTGRES_USER: ${POSTGRES_USER:-clube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clube}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clube} -d ${POSTGRES_DB:-clube_do_album}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clube-do-album-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: clube-do-album-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-clube}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-clube}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clube-do-album-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  clube-do-album-network:
    name: clube-do-album-network
